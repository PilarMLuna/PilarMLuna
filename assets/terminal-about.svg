  <text x="24" y="180" font-size="13"><tspan fill="#8B5CF6">ENFOQUE</tspan><tspan x="150" fill="#e5e5e5">Backend · Cloud · DevOps · Infraestructura Científica</tspan></text>
  <text x="24" y="204" font-size="13"><tspan fill="#8B5CF6">ESTADO</tspan><tspan x="150" fill="#e5e5e5">⚡ Construyendo, aprendiendo y mejorando</tspan></text>
  <text x="24" y="228" font-size="13"><tspan fill="#8B5CF6">MISIÓN</tspan><tspan x="150" fill="#e5e5e5">Crear software confiable, útil y reproducible.</tspan></text>

  <text x="24" y="262" fill="#e5e5e5" font-size="14">└─$ <tspan fill="#8B5CF6">whoami --verbose</tspan></text>
  <text x="24" y="286" fill="#a3a3a3" font-size="13">Enfocada en construir bases sólidas en backend</text>
