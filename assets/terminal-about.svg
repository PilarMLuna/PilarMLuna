  <text x="24" y="346" fill="#a3a3a3" font-size="13">flujos de trabajo colaborativos con Git.</text>
  <text x="24" y="366" fill="#a3a3a3" font-size="13">Cada proyecto es una oportunidad para aprender</text>
  <text x="24" y="386" fill="#a3a3a3" font-size="13">algo nuevo y construir mejor infraestructura.</text>

